<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Runner</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <a id="backLink" class="back" href="./racing.html">← Back</a>
    <h1 id="name">Runner</h1>
    <div id="meta" class="card"></div>
    <div id="notes" class="card"></div>
  </div>

  <script src="./app.js"></script>
  <script>
  (async () => {
    const raceNo = qs("race_no");
    const horseNo = qs("horse_no");
    document.getElementById("backLink").href = `./racing.html?race_no=${encodeURIComponent(raceNo || "1")}`;

    const data = await loadCSV("./gatecard.csv");
    const r = data.find(x =>
      String(x.race_no) === String(raceNo) &&
      String(x.horse_no) === String(horseNo)
    );

    if (!r) {
      document.getElementById("name").textContent = "Runner not found";
      document.getElementById("meta").textContent = "—";
      document.getElementById("notes").textContent = "—";
      return;
    }

    document.getElementById("name").textContent = `${r.horse_no}. ${r.horse_name}`;

    const colours = [r.cap_colour, r.body_colour, r.sleeves_colour].filter(Boolean).join(" / ");
    const safe = (s) => (s || "—").replaceAll("<","&lt;").replaceAll(">","&gt;");

    document.getElementById("meta").innerHTML = `
      <div><strong>Meeting:</strong> ${safe(r.event_name)}</div>
      <div><strong>Race:</strong> ${safe(r.race_no)}</div>
      <div><strong>Age/Sex:</strong> ${safe(r.age)} ${safe(r.sex)}</div>
      <div><strong>Weight:</strong> ${safe(r.weight)}</div>
      <div><strong>Going:</strong> ${safe(r.going)}</div>
      <div><strong>Trainer:</strong> ${safe(r.trainer)}</div>
      <div><strong>Jockey:</strong> ${safe(r.jockey)}</div>
      <div><strong>Owner:</strong> ${safe(r.owner)}</div>
      <div><strong>Colours:</strong> ${safe(colours)}</div>
    `;

    document.getElementById("notes").innerHTML =
      `<div><strong>Notes:</strong></div><div>${safe(r.notes)}</div>`;
  })().catch(err => console.error("RUNNER ERROR:", err));
  </script>
</body>
</html>
