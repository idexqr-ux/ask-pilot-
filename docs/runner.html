<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Runner</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <a id="backLink" class="back" href="./racing.html">← Back</a>
    <h1 id="name">Runner</h1>
    <div id="meta" class="card"></div>
    <div id="notes" class="card"></div>
  </div>

  <script src="./app.js"></script>
<script>
(async () => {
  const raceNo = qs("race_no");
  const horseNo = qs("horse_no");
  document.getElementById("backLink").href = `./racing.html?race_no=${encodeURIComponent(raceNo || "1")}`;

  const data = await loadCSV("./gatecard.csv");
  const r = data.find(x =>
    String(x.race_no) === String(raceNo) &&
    String(x.horse_no) === String(horseNo)
  );

  if (!r) {
    document.getElementById("name").textContent = "Runner not found";
    document.getElementById("meta").textContent = "—";
    document.getElementById("notes").textContent = "—";
    return;
  }

  const safe = (s) => (s ?? "—").toString().replaceAll("<","&lt;").replaceAll(">","&gt;");

  document.getElementById("name").textContent = `${r.horse_no}. ${r.horse_name}`;

  document.getElementById("meta").innerHTML = `
    <div><strong>Meeting:</strong> ${safe(r.meeting_name)}</div>
    <div><strong>Race:</strong> ${safe(r.race_no)}</div>
    <div><strong>Age/Sex:</strong> ${safe(r.age)} ${safe(r.sex)}</div>
    <div><strong>Trainer:</strong> ${safe(r.trainer_name)}</div>
    <div><strong>Jockey:</strong> ${safe(r.jockey_name)}</div>
    <div><strong>Owner:</strong> ${safe(r.owner)}</div>
    <div><strong>Weight:</strong> ${safe(r.weight_stone)}st ${safe(r.weight_pounds)}lb</div>
    <div><strong>Colours:</strong> ${safe(r.jockey_colours)}</div>
    <div><strong>Form (code):</strong> ${safe(r.form_code)}</div>
  `;
})();
</script>
</body>
</html>
